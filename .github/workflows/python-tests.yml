name: Quickstart Tests
on:
  pull_request:
  workflow_dispatch:

jobs:
  setup:
    runs-on: ubuntu-24.04
    outputs:
      agent_names: ${{ steps.find-agents.outputs.names }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker
        run: |
          # Stop and remove existing Docker installations
          sudo systemctl stop docker || true
          sudo systemctl stop docker.socket || true

          # Clean existing installations
          sudo apt-get remove -y docker docker-engine docker.io containerd runc
          sudo apt-get update

          # Install prerequisites
          sudo apt-get install -y \
            apt-transport-https \
            ca-certificates \
            curl \
            gnupg \
            lsb-release jq

          # Add Docker's GPG key
          curl -fsSL https://download.docker.com/linux/ubuntu/gpg | sudo gpg --dearmor -o /usr/share/keyrings/docker-archive-keyring.gpg

          # Add Docker repository
          echo \
            "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/docker-archive-keyring.gpg] https://download.docker.com/linux/ubuntu \
            $(lsb_release -cs) stable" | sudo tee /etc/apt/sources.list.d/docker.list > /dev/null

          # Install Docker
          sudo apt-get update
          sudo apt-get install -y docker-ce docker-ce-cli containerd.io

          # Start Docker service
          sudo systemctl start docker

      - id: find-agents
        run: |
          NAMES=$(ls configs/config_*.json | sed 's/configs\/config_//' | sed 's/\.json//' | jq -R -s -c 'split("\n")[:-1]')
          echo "Found agents: $NAMES"
          echo "names=$NAMES" >> $GITHUB_OUTPUT

  e2e-test-run-service:
    needs: setup
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        agent: ${{ fromJson(needs.setup.outputs.agent_names) }}
      fail-fast: false
    env:
      GNOSIS_RPC: ${{ secrets.GNOSIS_RPC }}
      MODE_RPC: ${{ secrets.MODE_RPC }}
      OPTIMISM_RPC: ${{ secrets.OPTIMISM_RPC }}
      BASE_RPC: ${{ secrets.BASE_RPC }}
      TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.14
      uses: actions/setup-python@v5
      with:
        python-version: '3.14'

    - uses: astral-sh/setup-uv@v6
      with:
        version: "0.11.15"

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y git

    - name: Create .env file
      run: |
        echo "GNOSIS_RPC=${GNOSIS_RPC}" > .env
        echo "MODE_RPC=${MODE_RPC}" >> .env
        echo "OPTIMISM_RPC=${OPTIMISM_RPC}" >> .env
        echo "BASE_RPC=${BASE_RPC}" >> .env
        echo "TEST_PASSWORD=${TEST_PASSWORD}" >> .env

    - name: Install project dependencies
      run: uv sync --all-groups --frozen

    - name: Run test
      run: PYTHONPATH=. uv run pytest -v tests/test_run_service.py -s --log-cli-level=INFO -k ${{ matrix.agent }}

    - name: Debug container failure
      if: failure()
      run: |
        docker ps -a
        for container in $(docker ps -aq); do
          echo "=== Logs for $container ==="
          docker logs $container
        done

  e2e-test-staking:
    runs-on: ubuntu-24.04
    env:
      GNOSIS_RPC: ${{ secrets.GNOSIS_RPC }}
      MODE_RPC: ${{ secrets.MODE_RPC }}
      OPTIMISM_RPC: ${{ secrets.OPTIMISM_RPC }}
      BASE_RPC: ${{ secrets.BASE_RPC }}
      TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.14
      uses: actions/setup-python@v5
      with:
        python-version: '3.14'

    - uses: astral-sh/setup-uv@v6
      with:
        version: "0.11.15"

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y git

    - name: Create .env file
      run: |
        echo "GNOSIS_RPC=${GNOSIS_RPC}" > .env
        echo "MODE_RPC=${MODE_RPC}" >> .env
        echo "OPTIMISM_RPC=${OPTIMISM_RPC}" >> .env
        echo "BASE_RPC=${BASE_RPC}" >> .env
        echo "TEST_PASSWORD=${TEST_PASSWORD}" >> .env

    - name: Install project dependencies
      run: uv sync --all-groups --frozen

    - name: Run test
      run: PYTHONPATH=. uv run pytest -v tests/test_staking_service.py -s --log-cli-level=INFO

    - name: Debug container failure
      if: failure()
      run: |
        docker ps -a
        for container in $(docker ps -aq); do
          echo "=== Logs for $container ==="
          docker logs $container
        done

  changes:
    runs-on: ubuntu-24.04
    outputs:
      migration: ${{ steps.filter.outputs.migration }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # need history so the base..head diff resolves on PRs
      - id: filter
        env:
          EVENT: ${{ github.event_name }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail

          # Always run on manual dispatch.
          if [ "$EVENT" = "workflow_dispatch" ]; then
            echo "migration=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Only `pull_request` provides usable BASE/HEAD SHAs. If anyone
          # adds a `push:` (or other) trigger later, fail loudly rather
          # than silently misfiring against empty SHAs.
          if [ "$EVENT" != "pull_request" ]; then
            echo "::error::changes filter doesn't support event '$EVENT'; add an explicit branch."
            exit 1
          fi
          if [ -z "$BASE_SHA" ] || [ -z "$HEAD_SHA" ]; then
            echo "::error::missing BASE_SHA/HEAD_SHA on pull_request event."
            exit 1
          fi

          # Only run the e2e migration job when files that affect it
          # actually change. uv.lock is the authoritative pin for the
          # middleware version (and everything else); any version bump
          # lands there even if pyproject.toml is also touched.
          if git diff --name-only "$BASE_SHA" "$HEAD_SHA" | grep -qE \
            '^(migrate_to_pearl\.sh$|scripts/pearl_migration/|tests/test_migrate_to_pearl\.py$|uv\.lock$|\.github/workflows/python-tests\.yml$)'; then
            echo "migration=true" >> "$GITHUB_OUTPUT"
          else
            echo "migration=false" >> "$GITHUB_OUTPUT"
          fi

  e2e-test-migrate-to-pearl:
    needs: changes
    if: needs.changes.outputs.migration == 'true'
    runs-on: ubuntu-24.04
    env:
      GNOSIS_RPC: ${{ secrets.GNOSIS_RPC }}
      MODE_RPC: ${{ secrets.MODE_RPC }}
      OPTIMISM_RPC: ${{ secrets.OPTIMISM_RPC }}
      BASE_RPC: ${{ secrets.BASE_RPC }}
      TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}

    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker
      run: |
        sudo systemctl stop docker || true
        sudo systemctl stop docker.socket || true
        sudo apt-get remove -y docker docker-engine docker.io containerd runc
        sudo apt-get update
        sudo apt-get install -y \
          apt-transport-https \
          ca-certificates \
          curl \
          gnupg \
          lsb-release jq
        curl -fsSL https://download.docker.com/linux/ubuntu/gpg | sudo gpg --dearmor -o /usr/share/keyrings/docker-archive-keyring.gpg
        echo \
          "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/docker-archive-keyring.gpg] https://download.docker.com/linux/ubuntu \
          $(lsb_release -cs) stable" | sudo tee /etc/apt/sources.list.d/docker.list > /dev/null
        sudo apt-get update
        sudo apt-get install -y docker-ce docker-ce-cli containerd.io
        sudo systemctl start docker

    - name: Set up Python 3.14
      uses: actions/setup-python@v5
      with:
        python-version: '3.14'

    - uses: astral-sh/setup-uv@v6
      with:
        version: "0.11.15"

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y git

    - name: Create .env file
      run: |
        echo "GNOSIS_RPC=${GNOSIS_RPC}" > .env
        echo "MODE_RPC=${MODE_RPC}" >> .env
        echo "OPTIMISM_RPC=${OPTIMISM_RPC}" >> .env
        echo "BASE_RPC=${BASE_RPC}" >> .env
        echo "TEST_PASSWORD=${TEST_PASSWORD}" >> .env

    - name: Install project dependencies
      run: uv sync --all-groups --frozen

    - name: Run test
      # 90 minutes: deploys 4 services across 2 quickstarts, runs 2 migrations
      # (Mode A then Mode B with on-chain transfers + drains), then redeploys
      # all 4 from the merged Pearl `.operate` to verify they start.
      timeout-minutes: 90
      run: PYTHONPATH=tests:. uv run pytest -v tests/test_migrate_to_pearl.py -s --log-cli-level=INFO

    - name: Debug container failure
      if: failure()
      run: |
        docker ps -a
        for container in $(docker ps -aq); do
          echo "=== Logs for $container ==="
          docker logs $container
        done

  unit-tests:
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12', '3.13', '3.14']
      fail-fast: false

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - uses: astral-sh/setup-uv@v6
      with:
        version: "0.11.15"

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y git

    - name: Install project dependencies
      # Pin uv's interpreter to the matrix Python so a different
      # `>=3.10,<3.15`-compatible Python on PATH can't silently
      # collapse the cross-version matrix to a single interpreter.
      run: uv sync --all-groups --frozen --python ${{ matrix.python-version }}

    - name: Run unit tests
      run: |
        PYTHONPATH=. uv run --python ${{ matrix.python-version }} pytest -v tests \
          --ignore=tests/test_run_service.py \
          --ignore=tests/test_staking_service.py \
          --ignore=tests/test_migrate_to_pearl.py \
          --cov=scripts \
          --cov-fail-under=100 \
          --cov-report=term-missing \
          --cov-report=xml:coverage-unit.xml

    - name: Upload unit test coverage report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: unit-test-coverage-xml-${{ matrix.python-version }}
        path: coverage-unit.xml

  all-checks-passed:
    # Single aggregate gate referenced by branch protection. When adding or
    # removing a mandatory job, update the `needs:` list here instead of
    # editing branch protection contexts.
    name: All checks passed
    if: always()
    runs-on: ubuntu-24.04
    needs:
      - setup
      - e2e-test-run-service
      - e2e-test-staking
      - changes
      - e2e-test-migrate-to-pearl
      - unit-tests
    steps:
      - name: Verify all dependencies succeeded or were skipped
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            echo "One or more required jobs failed or were cancelled."
            exit 1
          fi
